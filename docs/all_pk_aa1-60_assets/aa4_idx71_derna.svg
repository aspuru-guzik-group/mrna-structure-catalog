<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 640" width="760" height="640"><style>svg {
  display: block;
  min-width: 100%;
  width: 100%;
  min-height: 100%;
}

circle.node {
  stroke: #ccc;
  stroke-width: 1px;
  opacity: 1;
  fill: white;
}

circle.node.label {
    stroke: transparent;
    stroke-width: 0;
    fill: white;
}

circle.outline_node {
    stroke-width: 1px;
    fill: red;
}

circle.protein {
    fill: gray;
    fill-opacity: 0.5;
    stroke-width: 4;
}

circle.hidden_outline {
    stroke-width: 0px;
}


line.link {
  stroke: #999;
  stroke-opacity: 0.8;
  stroke-width: 2;
}

line.basepair {
  stroke: red;
}

line.intermolecule {
  stroke: blue;
}

line.chain_chain {
  stroke-dasharray: 3,3;
}

line.fake {
  stroke: green;
}

.transparent {
    fill: transparent;
    stroke-width: 0;
    stroke-opacity: 0;
    opacity: 0;
    visibility: hidden;
}

.drag_line {
  stroke: #999;
  stroke-width: 2;
  pointer-events: none;
}

.drag_line_hidden {
  stroke: #999;
  stroke-width: 0;
  pointer-events: none;
}

.d3-tip {
    line-height: 1;
    font-weight: bold;
    padding: 6px;
    background: rgba(0, 0, 0, 0.6);
    color: #fff;
    border-radius: 4px;
    pointer-events: none;
          }

text.node-label {
    font-weight: bold;
    font-family: Tahoma, Geneva, sans-serif;
    color: rgb(100,100,100);
    pointer-events: none;
}

text {
    pointer-events: none;
}

g.gnode {

}

circle.outline_node.selected {
    visibility: visible;
}

circle.outline_node {
    visibility: hidden;
}

.brush .extent {
  fill-opacity: .1;
  stroke: #fff;
  shape-rendering: crispEdges;
}

.noselect {
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    -khtml-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
